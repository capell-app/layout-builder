<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant – AI-Powered Editorial Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .hero {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: orbGlow 4s ease-in-out infinite;
        }

        .glow-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #10b981, transparent);
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .glow-2 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #3b82f6, transparent);
            bottom: -125px;
            right: -125px;
            animation-delay: 1.2s;
        }

        @keyframes orbGlow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(255,255,255,.05) 25%, rgba(255,255,255,.05) 26%, transparent 27%, transparent 74%, rgba(255,255,255,.05) 75%, rgba(255,255,255,.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(255,255,255,.05) 25%, rgba(255,255,255,.05) 26%, transparent 27%, transparent 74%, rgba(255,255,255,.05) 75%, rgba(255,255,255,.05) 76%, transparent 77%, transparent);
            background-size: 40px 40px;
        }

        .content {
            position: relative;
            z-index: 10;
            max-width: 48%;
        }

        .content h1 {
            font-size: 50px;
            font-weight: 800;
            margin-bottom: 12px;
            color: white;
            letter-spacing: -0.5px;
        }

        .content p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.6;
            font-weight: 500;
        }

        .badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .neural-network {
            position: relative;
            z-index: 5;
            width: 260px;
            height: 200px;
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.4));
        }

        .node {
            animation: nodeGlow 2s ease-in-out infinite;
        }

        .node-1 { animation-delay: 0s; }
        .node-2 { animation-delay: 0.3s; }
        .node-3 { animation-delay: 0.6s; }
        .node-4 { animation-delay: 0.9s; }
        .node-5 { animation-delay: 1.2s; }
        .node-6 { animation-delay: 1.5s; }

        @keyframes nodeGlow {
            0%, 100% { r: 3.5; opacity: 0.5; }
            50% { r: 5; opacity: 1; }
        }

        .connection {
            animation: connectionFlow 2.5s ease-in-out infinite;
            stroke-dasharray: 100;
        }

        .connection-1 { animation-delay: 0s; }
        .connection-2 { animation-delay: 0.4s; }
        .connection-3 { animation-delay: 0.8s; }
        .connection-4 { animation-delay: 1.2s; }
        .connection-5 { animation-delay: 1.6s; }

        @keyframes connectionFlow {
            0%, 100% { stroke-dashoffset: 100; opacity: 0.2; }
            50% { opacity: 0.7; }
        }

        .pulse-ring {
            animation: ringPulse 2s ease-out infinite;
        }

        @keyframes ringPulse {
            0% { r: 3; opacity: 1; }
            100% { r: 12; opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="glow-orb glow-1"></div>
        <div class="glow-orb glow-2"></div>
        <div class="grid-bg"></div>

        <div class="content">
            <div class="badge">AI Powered</div>
            <h1>Assistant</h1>
            <p>Intelligent editorial tools for generating content, suggesting titles, metadata, and enhancing your authoring workflow.</p>
        </div>

        <div class="neural-network">
            <svg viewBox="0 0 260 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Background -->
                <rect x="0" y="0" width="260" height="200" fill="rgba(255,255,255,0.02)" rx="4"/>

                <!-- Connections (links between nodes) -->
                <line class="connection connection-1" x1="50" y1="60" x2="130" y2="50" stroke="rgba(16, 185, 129, 0.5)" stroke-width="1"/>
                <line class="connection connection-1" x1="50" y1="100" x2="130" y2="90" stroke="rgba(59, 130, 246, 0.5)" stroke-width="1"/>
                <line class="connection connection-1" x1="50" y1="140" x2="130" y2="130" stroke="rgba(16, 185, 129, 0.5)" stroke-width="1"/>

                <line class="connection connection-2" x1="130" y1="50" x2="210" y2="60" stroke="rgba(59, 130, 246, 0.5)" stroke-width="1"/>
                <line class="connection connection-2" x1="130" y1="90" x2="210" y2="100" stroke="rgba(16, 185, 129, 0.5)" stroke-width="1"/>
                <line class="connection connection-2" x1="130" y1="130" x2="210" y2="140" stroke="rgba(59, 130, 246, 0.5)" stroke-width="1"/>

                <line class="connection connection-3" x1="50" y1="60" x2="50" y2="100" stroke="rgba(59, 130, 246, 0.3)" stroke-width="0.5"/>
                <line class="connection connection-3" x1="50" y1="100" x2="50" y2="140" stroke="rgba(16, 185, 129, 0.3)" stroke-width="0.5"/>
                <line class="connection connection-3" x1="210" y1="60" x2="210" y2="100" stroke="rgba(59, 130, 246, 0.3)" stroke-width="0.5"/>
                <line class="connection connection-3" x1="210" y1="100" x2="210" y2="140" stroke="rgba(16, 185, 129, 0.3)" stroke-width="0.5"/>

                <!-- Cross connections -->
                <line class="connection connection-4" x1="130" y1="50" x2="130" y2="130" stroke="rgba(59, 130, 246, 0.2)" stroke-width="0.5"/>

                <!-- Input nodes (left) -->
                <circle class="node node-1" cx="50" cy="60" r="3.5" fill="#10b981"/>
                <circle class="node node-2" cx="50" cy="100" r="3.5" fill="#3b82f6"/>
                <circle class="node node-3" cx="50" cy="140" r="3.5" fill="#10b981"/>

                <!-- Hidden layer nodes (middle) -->
                <circle class="node node-4" cx="130" cy="50" r="3.5" fill="#3b82f6"/>
                <circle class="node node-5" cx="130" cy="90" r="3.5" fill="#10b981"/>
                <circle class="node node-6" cx="130" cy="130" r="3.5" fill="#3b82f6"/>

                <!-- Output nodes (right) -->
                <circle class="node node-1" cx="210" cy="60" r="3.5" fill="#10b981"/>
                <circle class="node node-2" cx="210" cy="100" r="3.5" fill="#3b82f6"/>
                <circle class="node node-3" cx="210" cy="140" r="3.5" fill="#10b981"/>

                <!-- Pulse rings around center node -->
                <circle class="pulse-ring" cx="130" cy="90" r="3" fill="none" stroke="#10b981" stroke-width="0.5"/>
                <circle class="pulse-ring" cx="130" cy="90" r="3" fill="none" stroke="#3b82f6" stroke-width="0.5" style="animation-delay: 0.3s"/>

                <!-- Labels -->
                <text x="50" y="170" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">Input</text>
                <text x="130" y="170" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">Processing</text>
                <text x="210" y="170" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">Output</text>
            </svg>
        </div>
    </div>
</body>
</html>
