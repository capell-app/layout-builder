<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog – Content Publishing Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Garamond', serif;
            overflow: hidden;
        }

        .hero {
            width: 100%;
            height: 280px;
            background: #fafaf8;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
        }

        .background-accent {
            position: absolute;
            top: 0;
            right: 0;
            width: 60%;
            height: 100%;
            background: radial-gradient(ellipse 800px 400px at 100% 50%, rgba(220, 130, 103, 0.08) 0%, transparent 70%);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            max-width: 45%;
        }

        .content h1 {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #1a1a18;
            letter-spacing: -0.5px;
        }

        .content p {
            font-size: 15px;
            color: #6b6b68;
            line-height: 1.7;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .divider {
            width: 32px;
            height: 2px;
            background: linear-gradient(90deg, #d4644f, transparent);
            margin-bottom: 16px;
            border-radius: 2px;
        }

        .visual-pages {
            position: relative;
            z-index: 5;
            width: 280px;
            height: 200px;
            perspective: 1000px;
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.12));
        }

        .page {
            animation: pageFlip 4s ease-in-out infinite;
            transform-origin: 20px 100px;
        }

        .page-1 { animation-delay: 0s; }
        .page-2 { animation-delay: 1s; }
        .page-3 { animation-delay: 2s; }

        @keyframes pageFlip {
            0%, 10% { transform: rotateY(0deg) rotateZ(0deg); }
            35%, 65% { transform: rotateY(-25deg) rotateZ(-2deg); }
            90%, 100% { transform: rotateY(0deg) rotateZ(0deg); }
        }

        .text-line {
            animation: textPulse 2.5s ease-in-out infinite;
        }

        .text-line-1 { animation-delay: 0s; }
        .text-line-2 { animation-delay: 0.3s; }
        .text-line-3 { animation-delay: 0.6s; }

        @keyframes textPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="background-accent"></div>

        <div class="content">
            <div class="divider"></div>
            <h1>Blog</h1>
            <p>Publish and manage blog posts with built-in categories, tags, RSS feeds, and editorial workflows.</p>
        </div>

        <div class="visual-pages">
            <svg viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Page 3 (back) -->
                <g class="page page-3">
                    <rect x="30" y="20" width="140" height="160" fill="white" stroke="#ddd" stroke-width="0.5" rx="2"/>
                    <rect x="42" y="32" width="116" height="6" fill="#d4644f" opacity="0.3" rx="1"/>
                    <rect x="42" y="45" width="116" height="3" fill="#ccc" rx="1"/>
                    <rect x="42" y="52" width="116" height="3" fill="#ccc" rx="1"/>
                    <rect x="42" y="59" width="116" height="3" fill="#ccc" rx="1"/>
                    <rect x="42" y="72" width="80" height="3" fill="#ccc" rx="1"/>
                </g>

                <!-- Page 2 (middle) -->
                <g class="page page-2">
                    <rect x="40" y="15" width="140" height="160" fill="white" stroke="#d0d0d0" stroke-width="0.5" rx="2"/>
                    <rect x="52" y="27" width="116" height="7" fill="#d4644f" rx="1"/>
                    <rect x="52" y="42" width="116" height="3" fill="#ddd" rx="1"/>
                    <rect x="52" y="49" width="116" height="3" fill="#ddd" rx="1"/>
                    <rect x="52" y="56" width="116" height="3" fill="#ddd" rx="1"/>
                    <rect x="52" y="70" width="90" height="3" fill="#ddd" rx="1"/>
                    <circle cx="62" cy="92" r="4" fill="#d4644f" opacity="0.6"/>
                    <text class="text-line text-line-1" x="75" y="96" font-size="8" fill="#999">Featured highlight</text>
                </g>

                <!-- Page 1 (front) -->
                <g class="page page-1">
                    <rect x="50" y="10" width="140" height="160" fill="white" stroke="#b0b0b0" stroke-width="1" rx="2"/>

                    <!-- Title -->
                    <rect x="62" y="22" width="116" height="8" fill="#d4644f" rx="1"/>

                    <!-- Content lines -->
                    <rect class="text-line text-line-1" x="62" y="37" width="116" height="2.5" fill="#e0e0e0" rx="1"/>
                    <rect class="text-line text-line-2" x="62" y="43" width="116" height="2.5" fill="#e0e0e0" rx="1"/>
                    <rect class="text-line text-line-3" x="62" y="49" width="90" height="2.5" fill="#e0e0e0" rx="1"/>

                    <!-- Metadata tags -->
                    <rect x="62" y="62" width="28" height="14" fill="rgba(212, 100, 79, 0.1)" stroke="#d4644f" stroke-width="0.5" rx="7"/>
                    <text x="76" y="72" font-size="7" fill="#d4644f" text-anchor="middle" font-weight="600">Design</text>

                    <rect x="98" y="62" width="28" height="14" fill="rgba(212, 100, 79, 0.1)" stroke="#d4644f" stroke-width="0.5" rx="7"/>
                    <text x="112" y="72" font-size="7" fill="#d4644f" text-anchor="middle" font-weight="600">Web</text>

                    <!-- Decorative element -->
                    <line x1="62" y1="82" x2="150" y2="82" stroke="#d4644f" stroke-width="1" opacity="0.3"/>

                    <!-- Footer -->
                    <text x="62" y="105" font-size="6" fill="#999">Mar 15, 2024</text>
                    <text x="62" y="125" font-size="7" fill="#666" font-weight="600">By Editorial Team</text>
                </g>

                <!-- Decorative bookmark -->
                <rect x="195" y="5" width="8" height="35" fill="#d4644f" rx="1" opacity="0.7"/>
                <polygon points="195,40 190,35 200,35" fill="#d4644f" opacity="0.7"/>
            </svg>
        </div>
    </div>
</body>
</html>
