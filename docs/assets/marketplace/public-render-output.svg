<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
    <title id="title">Public layout render output</title>
    <desc id="desc">A public Capell page rendered from Layout Builder widgets without editor metadata.</desc>
    <rect width="1440" height="900" fill="#101820"/>
    <rect x="112" y="76" width="1216" height="748" rx="24" fill="#f8f4ec"/>
    <rect x="112" y="76" width="1216" height="82" rx="24" fill="#ffffff"/>
    <text x="164" y="127" font-family="Georgia, serif" font-size="34" fill="#0b2845">CAPELL</text>
    <text x="1000" y="123" font-family="Inter, Arial, sans-serif" font-size="15" fill="#3c3833">Products</text>
    <text x="1092" y="123" font-family="Inter, Arial, sans-serif" font-size="15" fill="#3c3833">Resources</text>
    <rect x="1196" y="100" width="104" height="36" rx="18" fill="#152d4a"/>
    <text x="1224" y="123" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Contact</text>
    <text x="164" y="222" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#9b6b25">Layout Builder</text>
    <text x="164" y="296" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#15130f">Reusable layouts,</text>
    <text x="164" y="362" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#15130f">clean public output.</text>
    <text x="164" y="416" font-family="Inter, Arial, sans-serif" font-size="20" fill="#5e574f">Editors compose approved widgets while visitors receive ordinary HTML.</text>
    <rect x="164" y="462" width="164" height="48" rx="24" fill="#152d4a"/>
    <text x="206" y="492" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">View guide</text>
    <rect x="808" y="214" width="370" height="356" rx="20" fill="#ffffff" stroke="#ded8cf"/>
    <rect x="842" y="250" width="300" height="130" rx="16" fill="#eaf0f7"/>
    <rect x="842" y="406" width="300" height="30" rx="15" fill="#d8c4a4"/>
    <rect x="842" y="456" width="224" height="24" rx="12" fill="#e6dfd3"/>
    <rect x="842" y="508" width="118" height="40" rx="20" fill="#152d4a"/>
    <rect x="164" y="642" width="332" height="118" rx="18" fill="#ffffff" stroke="#ded8cf"/>
    <text x="196" y="688" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#15130f">No editor metadata</text>
    <text x="196" y="724" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5e574f">Public HTML stays safe for visitors and caches.</text>
    <rect x="534" y="642" width="332" height="118" rx="18" fill="#ffffff" stroke="#ded8cf"/>
    <text x="566" y="688" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#15130f">Resolved widgets</text>
    <text x="566" y="724" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5e574f">Payloads are built before Blade renders.</text>
    <rect x="904" y="642" width="332" height="118" rx="18" fill="#ffffff" stroke="#ded8cf"/>
    <text x="936" y="688" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#15130f">Named areas</text>
    <text x="936" y="724" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5e574f">Theme slots stay explicit and reusable.</text>
</svg>
