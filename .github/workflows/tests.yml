name: Tests

on:
  pull_request:
    branches:
      - 4.x
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'packages/**/*.php'
      - 'tests/**/*.php'
      - '.github/workflows/tests.yml'
  push:
    branches:
      - 4.x

concurrency:
  group: ${{ github.head_ref || github.ref }}-phpunit
  cancel-in-progress: true

jobs:
  test-minimal:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    name: Tests (PR - minimal)
    runs-on: ubuntu-latest
    env:
      COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.ACCESS_TOKEN }}"} }'
    strategy:
      fail-fast: true
      matrix:
        include:
          - php: 8.2
            laravel: 11.*
            testbench: 9.*
            db: sqlite

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_cms_multi
        ports:
          - '${{ vars.MYSQL_PORT || 3306 }}:3306'
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -proot || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Dependencies PHP
        id: php-cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: dependencies-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-testbench-${{ matrix.testbench }}-${{ matrix.db }}-${{ hashFiles('composer.lock', '.github/workflows/tests.yml') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, fileinfo, intl, json, libxml, mbstring, pdo_mysql, pdo_sqlite, simplexml, sqlite3, zip
          tools: composer:v2
          coverage: xdebug

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install PHP dependencies
        if: steps.php-cache.outputs.cache-hit != 'true'
        run: |
          composer remove --no-interaction --no-progress --ansi --dev --no-update laravel/pao
          composer require --no-interaction --no-progress --ansi --no-update \
            "laravel/framework:${{ matrix.laravel }}"
          composer require --no-interaction --no-progress --ansi --dev --no-update \
            "orchestra/testbench:${{ matrix.testbench }}"

          if [ "${{ matrix.php }}" = "8.2" ]; then
            composer remove --no-interaction --no-progress --ansi --dev --no-update mrpunyapal/peststan pestphp/pest-plugin-livewire calebdw/larastan-livewire
            composer require --no-interaction --no-progress --ansi --dev --no-update \
              soyhuce/phpstan-extension:^1.1 \
              pestphp/pest:^3.0 \
              pestphp/pest-plugin-arch:^3.0 \
              pestphp/pest-plugin-laravel:^3.0 \
              pestphp/pest-plugin-type-coverage:^3.0 \
              phpstan/phpstan:^1.10.57 \
              phpstan/phpstan-mockery:^1.0 \
              phpstan/phpstan-strict-rules:^1.0 \
              canvural/larastan-strict-rules:^2.0 \
              phpstan/phpstan-beberlei-assert:^1.0 \
              rector/rector:^1.0 \
              driftingly/rector-laravel:^1.0 \
              larastan/larastan:^2.0
            composer require --no-interaction --no-progress --ansi --no-update \
              livewire/livewire:^4.1 \
              filament/filament:^5.2 \
              filament/support:^5.2 \
              pboivin/filament-peek:^4.0 \
              symfony/html-sanitizer:^7.0 \
              openspout/openspout:^4.22
          fi
          composer update --no-interaction --no-progress --ansi --optimize-autoloader --with-all-dependencies -W

      - name: Configure environment
        run: |
          if [ "${{ matrix.db }}" == "mysql" ]; then
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=127.0.0.1" >> .env
            echo "DB_PORT=${{ vars.MYSQL_PORT || 3306 }}" >> .env
            echo "DB_DATABASE=test_cms_multi" >> .env
            echo "DB_USERNAME=root" >> .env
            echo "DB_PASSWORD=root" >> .env
          else
            echo "DB_CONNECTION=sqlite" >> .env
            echo "DB_DATABASE=:memory:" >> .env
          fi

      - name: Rector Cache
        uses: actions/cache@v5
        with:
          path: /tmp/rector
          key: ${{ runner.os }}-rector-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-rector-
      - run: mkdir -p /tmp/rector

      - name: PHPStan Cache
        uses: actions/cache@v5
        with:
          path: /tmp/phpstan
          key: ${{ runner.os }}-phpstan-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-phpstan-
      - run: mkdir -p /tmp/phpstan

      - name: Execute tests
        run: php -d memory_limit=-1 vendor/bin/pest --colors=always --parallel --configuration=phpunit-pipelines.xml

  test-full:
    if: github.event_name == 'push'
    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - DB${{ matrix.db }}
    runs-on: ubuntu-latest
    env:
      COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.ACCESS_TOKEN }}"} }'
    strategy:
      fail-fast: true
      matrix:
        include:
          - php: 8.2
            laravel: 11.*
            testbench: 9.*
            stability: prefer-stable
            db: sqlite
          - php: 8.4
            laravel: 12.*
            testbench: 10.*
            stability: prefer-stable
            db: mysql

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_cms_multi
        ports:
          - '${{ vars.MYSQL_PORT || 3306 }}:3306'
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -proot || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Dependencies PHP
        id: php-cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: dependencies-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-testbench-${{ matrix.testbench }}-${{ matrix.db }}-${{ hashFiles('composer.lock', '.github/workflows/tests.yml') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, fileinfo, intl, json, libxml, mbstring, pdo_mysql, pdo_sqlite, simplexml, sqlite3, zip
          tools: composer:v2
          coverage: xdebug

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install PHP dependencies
        if: steps.php-cache.outputs.cache-hit != 'true'
        run: |
          composer remove --no-interaction --no-progress --ansi --dev --no-update laravel/pao
          composer require --no-interaction --no-progress --ansi --no-update \
            "laravel/framework:${{ matrix.laravel }}"
          composer require --no-interaction --no-progress --ansi --dev --no-update \
            "orchestra/testbench:${{ matrix.testbench }}"

          if [ "${{ matrix.php }}" = "8.2" ]; then
            composer remove --no-interaction --no-progress --ansi --dev --no-update mrpunyapal/peststan pestphp/pest-plugin-livewire calebdw/larastan-livewire
            composer require --no-interaction --no-progress --ansi --dev --no-update \
              soyhuce/phpstan-extension:^1.1 \
              pestphp/pest:^3.0 \
              pestphp/pest-plugin-arch:^3.0 \
              pestphp/pest-plugin-laravel:^3.0 \
              pestphp/pest-plugin-type-coverage:^3.0 \
              phpstan/phpstan:^1.10.57 \
              phpstan/phpstan-mockery:^1.0 \
              phpstan/phpstan-strict-rules:^1.0 \
              canvural/larastan-strict-rules:^2.0 \
              phpstan/phpstan-beberlei-assert:^1.0 \
              rector/rector:^1.0 \
              driftingly/rector-laravel:^1.0 \
              larastan/larastan:^2.0
            composer require --no-interaction --no-progress --ansi --no-update \
              livewire/livewire:^4.1 \
              filament/filament:^5.2 \
              filament/support:^5.2 \
              pboivin/filament-peek:^4.0 \
              symfony/html-sanitizer:^7.0 \
              openspout/openspout:^4.22
          fi
          composer update --no-interaction --no-progress --ansi --optimize-autoloader --with-all-dependencies -W

      - name: Configure environment
        run: |
          if [ "${{ matrix.db }}" == "mysql" ]; then
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=127.0.0.1" >> .env
            echo "DB_PORT=${{ vars.MYSQL_PORT || 3306 }}" >> .env
            echo "DB_DATABASE=test_cms_multi" >> .env
            echo "DB_USERNAME=root" >> .env
            echo "DB_PASSWORD=root" >> .env
          else
            echo "DB_CONNECTION=sqlite" >> .env
            echo "DB_DATABASE=:memory:" >> .env
          fi

      - name: Rector Cache
        uses: actions/cache@v5
        with:
          path: /tmp/rector
          key: ${{ runner.os }}-rector-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-rector-
      - run: mkdir -p /tmp/rector

      - name: PHPStan Cache
        uses: actions/cache@v5
        with:
          path: /tmp/phpstan
          key: ${{ runner.os }}-phpstan-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-phpstan-
      - run: mkdir -p /tmp/phpstan

      - name: Execute tests
        run: php -d memory_limit=-1 vendor/bin/pest --colors=always --parallel --configuration=phpunit-pipelines.xml

      - name: Upload coverage
        uses: gaelgirodon/ci-badges-action@v1
        if: github.ref == 'refs/heads/master'
        with:
          gist-id: 9dd8e508cb2433728d42a258193770eb
          token: ${{ secrets.GIST_TOKEN }}
