name: monorepo-split

on:
  push:
    tags: '*'

jobs:
  split-monorepo:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_directory: packages/assistant
            repository_name: assistant
          - package_directory: packages/address
            repository_name: address
          - package_directory: packages/analytics
            repository_name: analytics
          - package_directory: packages/backup
            repository_name: backup
          - package_directory: packages/blog
            repository_name: blog
          - package_directory: packages/campaigns
            repository_name: campaigns
          - package_directory: packages/content-blocks
            repository_name: content-blocks
          - package_directory: packages/default-theme
            repository_name: default-theme
          - package_directory: packages/developer-tools
            repository_name: developer-tools
          - package_directory: packages/filament-peek
            repository_name: filament-peek
          - package_directory: packages/forms
            repository_name: forms
          - package_directory: packages/html-minify
            repository_name: html-minify
          - package_directory: packages/authentication-log
            repository_name: authentication-log
          - package_directory: packages/mcp
            repository_name: mcp
          - package_directory: packages/media-assistant
            repository_name: media-assistant
          - package_directory: packages/media-curator
            repository_name: media-curator
          - package_directory: packages/mosaic
            repository_name: mosaic
          - package_directory: packages/navigation
            repository_name: navigation
          - package_directory: packages/redirects
            repository_name: redirects
          - package_directory: packages/password-security
            repository_name: password-security
          - package_directory: packages/seo-tools
            repository_name: seo-tools
          - package_directory: packages/site-search
            repository_name: site-search
          - package_directory: packages/tags
            repository_name: tags
          - package_directory: packages/theme-studio
            repository_name: theme-studio
          - package_directory: packages/theme-studio-admin
            repository_name: theme-studio-admin
          - package_directory: packages/theme-studio-core
            repository_name: theme-studio-core
          - package_directory: packages/theme-agency
            repository_name: theme-agency
          - package_directory: packages/theme-corporate
            repository_name: theme-corporate
          - package_directory: packages/theme-saas
            repository_name: theme-saas
          - package_directory: packages/toolbar
            repository_name: frontend-toolbar
          - package_directory: packages/workspaces
            repository_name: workspaces
    steps:
      - uses: actions/checkout@v6
      - id: previous-tag
        uses: 'WyriHaximus/github-action-get-previous-tag@master'
      - name: Monorepo Split of ${{ matrix.repository_name }}
        uses: danharrin/monorepo-split-github-action@v2.4.4
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          package_directory: '${{ matrix.package_directory }}'
          repository_organization: 'capell-app'
          repository_name: '${{ matrix.repository_name }}'
          branch: '4.x'
          tag: ${{ steps.previous-tag.outputs.tag }}
          user_name: 'capell-app'
          user_email: 'appcapello@gmail.com'
